name: Verify Human Identity

on:
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Install ClawHub
        run: npx clawhub@latest install verified-agent-identity

      - name: Create Identity
        run: npx clawhub@latest create-identity

      - name: Link Human
        run: |
          npx clawhub@latest link-human --challenge '{"name": "dhantz26", "description": "dhantz26 AI Agent"}''
