name: Verify Human Identity

on:
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Install ClawHub
        run: npm install -g clawhub

      - name: Install Skill
        run: clawhub install verified-agent-identity

      - name: Create Identity
        run: clawhub create-identity

      - name: Link Human
        run: |
          clawhub link-human --challenge '{"name": "dhantz26", "description": "dhantz26 AI Agent"}'
